<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Premium E-commerce experience" />
  <title>Lumina Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <!-- Simple icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="/" class="brand" data-link>
        <i class="fa-solid fa-gem"></i> Lumina
      </a>
      
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products..." />
        <button id="searchBtn"><i class="fa-solid fa-search"></i></button>
      </div>

      <div class="nav-links">
        <a href="/cart" class="nav-icon" data-link>
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge" id="cartBadge">0</span>
        </a>
        <div id="authLinks" class="auth-links">
          <!-- Populated dynamically -->
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main id="app">
    <!-- View content is injected here by router -->
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-section">
        <h3>Lumina Store</h3>
        <p>Premium quality products with modern aesthetics.</p>
      </div>
      <div class="footer-section">
        <h3>Links</h3>
        <a href="/" data-link>Home</a>
        <a href="/cart" data-link>Cart</a>
      </div>
      <div class="footer-section">
        <h3>Contact</h3>
        <p>support@lumina.store</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Lumina Store. All rights reserved.</p>
    </div>
  </footer>

  <!-- Toast Notifications container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Application Logic -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
